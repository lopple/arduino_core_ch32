name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - rc/v2

permissions:
  contents: read
  issues: write
  pull_requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch base branches for diff generation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run AI PR Reviewer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python tools/ai_pr_reviewer.py
